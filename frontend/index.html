<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MusicReader — Sight Reading Practice</title>
  </head>
  <body>
    <header>
      <h1>MusicReader</h1>
      <p class="tagline">Generate and play sight-reading exercises.</p>
    </header>

    <section id="topbar">
      <div id="presets" class="presets"></div>
      <label class="namefield">Name
        <input id="config_name" type="text" placeholder="Custom" />
      </label>
      <button id="generate" type="button">Generate</button>
    </section>

    <section id="library">
      <label>Saved &amp; recent
        <select id="config_list"></select>
      </label>
      <button id="load" type="button">Load</button>
      <button id="save" type="button">Save</button>
      <button id="delete" type="button">Delete</button>
      <span class="spacer"></span>
      <button id="export" type="button">Export</button>
      <label class="filebtn">Import<input id="import" type="file" accept="application/json" /></label>
    </section>

    <details id="customize">
      <summary>Customize</summary>
      <form id="controls">
        <fieldset>
          <legend>Meter</legend>
          <label>Beats <input id="numerator" type="number" min="1" max="32" value="4" /></label>
          <label>Per
            <select id="denominator">
              <option value="1">whole</option>
              <option value="2">half</option>
              <option value="4" selected>quarter</option>
              <option value="8">eighth</option>
              <option value="16">sixteenth</option>
            </select>
          </label>
        </fieldset>

        <fieldset>
          <legend>Clef</legend>
          <select id="clef"></select>
        </fieldset>

        <fieldset>
          <legend>Length</legend>
          <label>Measures <input id="measures" type="number" min="1" max="64" value="16" /></label>
        </fieldset>

        <fieldset class="wide">
          <legend>Keys</legend>
          <div id="keys" class="keygroups"></div>
        </fieldset>

        <fieldset class="wide">
          <legend>Note values</legend>
          <div id="rhythm" class="checkgroup"></div>
        </fieldset>

        <fieldset class="wide">
          <legend>Rests</legend>
          <label class="checkbox"><input id="rests_enabled" type="checkbox" /> Enable rests</label>
          <label>Density <span id="density_value">0%</span>
            <input id="density" type="range" min="0" max="100" value="0" />
          </label>
          <div id="rest_values" class="checkgroup"></div>
        </fieldset>

        <fieldset>
          <legend>Melody</legend>
          <label>Max leap <select id="max_interval"></select></label>
          <label class="checkbox"><input id="syncopation" type="checkbox" /> Syncopation</label>
          <label class="checkbox"><input id="polyphonic" type="checkbox" /> Polyphonic</label>
          <label>Min pitch <select id="min_pitch"></select></label>
          <label>Max pitch <select id="max_pitch"></select></label>
        </fieldset>
      </form>
    </details>

    <section id="player">
      <button id="play" type="button" disabled>▶ Play</button>
      <button id="pause" type="button" disabled>❚❚ Pause</button>
      <button id="stop" type="button" disabled>■ Stop</button>
      <label class="tempo">Tempo: <span id="tempo-value">90</span> bpm
        <input id="tempo" type="range" min="30" max="240" value="90" />
      </label>
      <label>Instrument
        <select id="instrument">
          <option value="piano" selected>Piano</option>
          <option value="guitar">Guitar</option>
          <option value="violin">Violin</option>
        </select>
      </label>
      <label class="checkbox"><input id="metronome" type="checkbox" /> Metronome</label>
      <label class="checkbox"><input id="count_in" type="checkbox" /> Count in</label>
    </section>

    <p id="status"></p>
    <div id="sheet"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
